<!DOCTYPE html>
<html>

<head>

<title>Our Memories ❤️</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<h2>September 2024</h2>

<div id="gallery"></div>

<script>

const apiKey = "AIzaSyChyZCyBdO9nR5bKNRj4_yKCG-qX8EHdvQ";
const folderId = "1hTnqt7Yp0TmaUfDqcxjS6rvXadbSurMe";
const mediaItems = [];

fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)&pageSize=1000`)

.then(res => res.json())

.then(data => {

const gallery = document.getElementById("gallery");

data.files.forEach(file => {
  
mediaItems.push(file);

if(file.mimeType.includes("image")){

const link = document.createElement("a");

link.href = `https://drive.google.com/thumbnail?id=${file.id}&sz=w2000`;
link.dataset.pswpWidth = "2000";
link.dataset.pswpHeight = "1500";

const img = document.createElement("img");
img.loading = "lazy";
img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;
img.onclick = (e) => {
e.preventDefault();
openMedia(file.id);
};

img.style.width="100%";
img.style.borderRadius="10px";

link.appendChild(img);
gallery.appendChild(link);
}

if(file.mimeType.includes("video")){

const container = document.createElement("div");
container.style.position="relative";
container.style.cursor="pointer";

const thumb = document.createElement("img");
thumb.loading = "lazy";
thumb.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
thumb.style.width="100%";
thumb.style.borderRadius="10px";

const play = document.createElement("div");
play.innerHTML="▶";
play.style.position="absolute";
play.style.top="50%";
play.style.left="50%";
play.style.transform="translate(-50%,-50%)";
play.style.fontSize="60px";
play.style.color="white";
play.style.textShadow="0 0 20px black";

container.appendChild(thumb);
container.appendChild(play);

container.onclick = () => openMedia(file.id);

gallery.appendChild(container);

}
  
});

});

</script>

<div id="mediaViewer" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
">

<div id="mediaContent"></div>

<button onclick="prevMedia()" style="
position:absolute;
left:20px;
top:50%;
font-size:40px;
color:white;
background:none;
border:none;
cursor:pointer;">‹</button>

<button onclick="nextMedia()" style="
position:absolute;
right:20px;
top:50%;
font-size:40px;
color:white;
background:none;
border:none;
cursor:pointer;">›</button>

<button onclick="closeMedia()" style="
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
background:none;
border:none;
cursor:pointer;">✕</button>

</div>

<script>

let currentIndex = 0;

function openMedia(id){

currentIndex = mediaItems.findIndex(f => f.id === id);
showMedia();

document.getElementById("mediaViewer").style.display="flex";

}

function showMedia(){

const file = mediaItems[currentIndex];
const container = document.getElementById("mediaContent");

container.innerHTML="";

if(file.mimeType.includes("image")){

const img = document.createElement("img");
img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w2000`;
img.style.maxHeight="90vh";
img.style.maxWidth="90vw";
img.style.objectFit="contain";

container.appendChild(img);

}

if(file.mimeType.includes("video")){

const iframe = document.createElement("iframe");
iframe.src = `https://drive.google.com/file/d/${file.id}/preview`;
iframe.style.width="80vw";
iframe.style.height="80vh";
iframe.style.border="none";

container.appendChild(iframe);

}

}

function nextMedia(){
currentIndex=(currentIndex+1)%mediaItems.length;
showMedia();
}

function prevMedia(){
currentIndex=(currentIndex-1+mediaItems.length)%mediaItems.length;
showMedia();
}

function closeMedia(){
document.getElementById("mediaViewer").style.display="none";
}
document.addEventListener("keydown", e => {

if(document.getElementById("mediaViewer").style.display === "flex"){

if(e.key === "ArrowRight") nextMedia();
if(e.key === "ArrowLeft") prevMedia();
if(e.key === "Escape") closeMedia();

}

});

</script>

</body>

</html>
