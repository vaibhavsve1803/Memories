<!DOCTYPE html>
<html>

<head>

<title>Our Memories ❤️</title>

<link rel="stylesheet"
href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<script>

var password = prompt("Enter our secret password ❤️");

if(password !== "ourstory"){
document.body.innerHTML = "Access denied";
}

</script>

<h2>July 2024</h2>

<div id="gallery"></div>

<script>

const apiKey = "AIzaSyChyZCyBdO9nR5bKNRj4_yKCG-qX8EHdvQ";
const folderId = "10w0X1ZyI6wnwB-_6nWTrtTHmHYk2qW0G";

fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)&pageSize=1000`)

.then(res => res.json())

.then(data => {

const gallery = document.getElementById("gallery");

data.files.forEach(file => {

if(file.mimeType.includes("image")){

const link = document.createElement("a");

link.href = `https://drive.google.com/thumbnail?id=${file.id}&sz=w2000`;
link.dataset.pswpWidth = "2000";
link.dataset.pswpHeight = "1500";

const img = document.createElement("img");
img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w800`;

img.style.width="100%";
img.style.borderRadius="10px";

link.appendChild(img);
gallery.appendChild(link);
}

if(file.mimeType.includes("video")){

const container = document.createElement("div");
container.style.position="relative";
container.style.cursor="pointer";

const thumb = document.createElement("img");
thumb.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
thumb.style.width="100%";
thumb.style.borderRadius="10px";

const play = document.createElement("div");
play.innerHTML="▶";
play.style.position="absolute";
play.style.top="50%";
play.style.left="50%";
play.style.transform="translate(-50%,-50%)";
play.style.fontSize="60px";
play.style.color="white";
play.style.textShadow="0 0 20px black";

container.appendChild(thumb);
container.appendChild(play);

container.onclick = () => openVideo(file.id);

gallery.appendChild(container);

}
  
});

});

</script>

<div id="videoModal" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
">

<iframe id="videoFrame"
width="80%"
height="80%"
style="border:none;border-radius:10px;"></iframe>

<div onclick="closeVideo()" style="
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;">
✕
</div>

</div>

<script>

function openVideo(id){
document.getElementById("videoModal").style.display="flex";
document.getElementById("videoFrame").src =
`https://drive.google.com/file/d/${id}/preview`;
}

function closeVideo(){
document.getElementById("videoModal").style.display="none";
document.getElementById("videoFrame").src="";
}

</script>

<script type="module">

import PhotoSwipeLightbox from
"https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.js";

const lightbox = new PhotoSwipeLightbox({
gallery: '#gallery',
children: 'a',
pswpModule: () =>
import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.js')
});

lightbox.init();

</script>

</body>

</html>
