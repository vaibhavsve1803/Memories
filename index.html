<!DOCTYPE html>
<html>

<head>

<title>Our Memories ❤️</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<script>

var password = prompt("Enter our secret password ❤️");

if(password !== "ourstory"){
document.body.innerHTML = "Access denied";
}

</script>

<h2>July 2024</h2>

<div id="gallery"></div>

<script>

const apiKey = "AIzaSyChyZCyBdO9nR5bKNRj4_yKCG-qX8EHdvQ";
const folderId = "10w0X1ZyI6wnwB-_6nWTrtTHmHYk2qW0G";

fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)&pageSize=1000`)

.then(res => res.json())

.then(data => {

const gallery = document.getElementById("gallery");

data.files.forEach(file => {

if(file.mimeType.includes("image")){

const img = document.createElement("img");

img.src = `https://lh3.googleusercontent.com/d/${file.id}`;

gallery.appendChild(img);

}

});

});

</script>

</body>

</html>
