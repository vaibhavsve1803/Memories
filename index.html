<!DOCTYPE html>
<html>
<head>

<title>Our Memories ❤️</title>

</head>

<body>

<script>

var password = prompt("Enter our secret password ❤️");

if(password !== "ourstory"){
document.body.innerHTML = "Access denied";
}

</script>
  
<h2>July 2024</h2>

<div id="gallery"></div>

<script>

const apiKey = "AIzaSyChyZCyBdO9nR5bKNRj4_yKCG-qX8EHdvQ";
const folderId = "10w0X1ZyI6wnwB-_6nWTrtTHmHYk2qW0G";

fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${apiKey}&fields=files(id,name,mimeType)`)

.then(res => res.json())

.then(data => {

const gallery = document.getElementById("gallery");

data.files.forEach(file => {

if(file.mimeType.includes("image")){

const img = document.createElement("img");

img.src = `https://drive.google.com/uc?id=${file.id}`;

img.style.width = "250px";
img.style.margin = "10px";
img.style.borderRadius = "10px";

gallery.appendChild(img);

}

});

});

</script>

</body>
</html>
