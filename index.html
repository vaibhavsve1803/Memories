<!DOCTYPE html>
<html>

<head>

<title>Our Memories ❤️</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:20px;
}

img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<script>

var password = prompt("Enter our secret password ❤️");

if(password !== "ourstory"){
document.body.innerHTML = "Access denied";
}

</script>

<h2>July 2024</h2>

<div id="gallery"></div>

<script>

const apiKey = "AIzaSyChyZCyBdO9nR5bKNRj4_yKCG-qX8EHdvQ";
const folderId = "10w0X1ZyI6wnwB-_6nWTrtTHmHYk2qW0G";

fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)&pageSize=1000`)

.then(res => res.json())

.then(data => {

const gallery = document.getElementById("gallery");

data.files.forEach(file => {

if(file.mimeType.includes("image")){

const img = document.createElement("img");
img.src = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
gallery.appendChild(img);

}

if(file.mimeType.includes("video")){

const container = document.createElement("div");
container.style.position = "relative";
container.style.cursor = "pointer";

const thumb = document.createElement("img");
thumb.src = "https://cdn-icons-png.flaticon.com/512/727/727245.png";
thumb.style.width = "100%";
thumb.style.opacity = "0.8";

const play = document.createElement("div");
play.innerHTML = "▶";
play.style.position = "absolute";
play.style.top = "50%";
play.style.left = "50%";
play.style.transform = "translate(-50%,-50%)";
play.style.fontSize = "40px";
play.style.color = "white";

container.appendChild(thumb);
container.appendChild(play);

container.onclick = () => {
window.open(`https://drive.google.com/file/d/${file.id}/view`);
};

gallery.appendChild(container);

}
  
});

});

</script>

</body>

</html>
