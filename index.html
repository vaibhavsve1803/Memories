<div class="timeLabel">Seconds</div>
</div>

<script>

const startDate = new Date("2024-06-30T00:00:00");

function updateTimer(){

const now = new Date();
let diff = now - startDate;

const seconds = Math.floor(diff / 1000) % 60;
const minutes = Math.floor(diff / (1000 * 60)) % 60;
const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;

let daysTotal = Math.floor(diff / (1000 * 60 * 60 * 24));

const years = Math.floor(daysTotal / 365);
daysTotal = daysTotal % 365;

const months = Math.floor(daysTotal / 30);
const days = daysTotal % 30;

updateBox("years", years);
updateBox("months", months);
updateBox("days", days);
updateBox("hours", hours);
updateBox("minutes", minutes);
updateBox("seconds", seconds);

}

function updateBox(id,value){

const el = document.getElementById(id);

if(el.innerText != value){

el.classList.remove("flip");

void el.offsetWidth;

el.classList.add("flip");

el.innerText = value;

}

}

setInterval(updateTimer,1000);
updateTimer();

</script>
